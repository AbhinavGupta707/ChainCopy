name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos:
    name: macOS build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Test
        run: xcodebuild -project ChainCopy.xcodeproj -scheme ChainCopy -destination 'platform=macOS' test
